name: Sync Skills Version

on:
  push:
    paths:
      - 'packages/mcp/package.json'

permissions:
  contents: write

jobs:
  sync:
    name: Sync @projitive/skills version to match @projitive/mcp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Read mcp version
        id: ver
        run: echo "version=$(jq -r .version packages/mcp/package.json)" >> "$GITHUB_OUTPUT"

      - name: Update skills version
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' \
            packages/skills/package.json > /tmp/skills-pkg.json
          mv /tmp/skills-pkg.json packages/skills/package.json

      - name: Commit if changed
        run: |
          if ! git diff --quiet packages/skills/package.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/skills/package.json
            git commit -m "chore: sync skills version to ${{ steps.ver.outputs.version }} [skip ci]"
            git push
          fi
