name: Release Publish MCP

on:
  push:
    tags:
      - '*.*.*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish-mcp:
    name: Publish @projitive/mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache-dependency-path: packages/mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type Check
        run: npm run lint:types

      - name: ESLint
        run: npm run lint:eslint

      - name: Test
        run: npm run test

      - name: Verify package version matches release tag
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "Package version ($PACKAGE_VERSION) does not match release tag ($RELEASE_TAG)."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
